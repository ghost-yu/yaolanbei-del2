<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuguang Smart Film | Business Plan</title>
<link rel="icon" type="image/png" href="assets/img/yuguang/image33.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/unified.css">
</head>
<body>

<div class="topbar">
<div class="topbar-inner">
<a class="brand" href="index.html"><img src="assets/img/yuguang/image33.png" alt="">驭光智膜</a>
<button class="nav-toggle" onclick="document.getElementById('nav').classList.toggle('open')"><i class="fas fa-bars"></i></button>
<div class="nav" id="nav">
<a href="index.html">首页</a>
<a href="platform.html">研发与交付</a>
<a href="products.html">方案与定价</a>
<a href="core-tech.html">核心技术</a>
<a href="business-plan.html" class="active">商业计划</a>
<a href="contact.html">联系我们</a>
</div>
</div>
</div>

<div class="page">

<section class="kpis" id="overview">
<div class="kpi"><div class="label" id="kpiL1"></div><div class="value">15-2200nm</div><div class="tip" id="kpiT1"></div></div>
<div class="kpi"><div class="label" id="kpiL2"></div><div class="value">3-15</div><div class="tip" id="kpiT2"></div></div>
<div class="kpi"><div class="label" id="kpiL3"></div><div class="value">65%+</div><div class="tip" id="kpiT3"></div></div>
<div class="kpi"><div class="label" id="kpiL4"></div><div class="value">30%+</div><div class="tip" id="kpiT4"></div></div>
</section>

<section class="main-grid">
<div>
<article class="panel hero">
<div class="title" id="heroTitle"></div>
<h1 id="heroH1"></h1>
<p id="heroP"></p>
</article>
<article class="panel" id="pain">
<div class="title" id="painTitle"></div>
<div class="list">
<div class="item" id="pain1"></div>
<div class="item" id="pain2"></div>
<div class="item" id="pain3"></div>
<div class="item" id="pain4"></div>
</div>
</article>
<article class="panel">
<div class="title" id="marketTitle"></div>
<div class="bar-block"><div class="bar-head"><span id="m1"></span><span>88%</span></div><div class="track"><div class="fill" style="width:88%"></div></div></div>
<div class="bar-block"><div class="bar-head"><span id="m2"></span><span>81%</span></div><div class="track"><div class="fill" style="width:81%"></div></div></div>
<div class="bar-block"><div class="bar-head"><span id="m3"></span><span>69%</span></div><div class="track"><div class="fill" style="width:69%"></div></div></div>
<div class="bar-block"><div class="bar-head"><span id="m4"></span><span>64%</span></div><div class="track"><div class="fill" style="width:64%"></div></div></div>
</article>
</div>

<div>
<article class="panel" id="solution">
<div class="title" id="solutionTitle"></div>
<div class="list">
<div class="item" id="s1"></div>
<div class="item" id="s2"></div>
<div class="item" id="s3"></div>
<div class="item" id="s4"></div>
</div>
</article>
<article class="panel" id="simulator">
<div class="title" id="simTitle"></div>
<div class="sim-grid">
<div>
<div class="row"><label for="wave" id="lbWave"></label><input id="wave" type="number" min="15" max="2200" value="850"></div>
<div class="row"><label for="life" id="lbLife"></label><input id="life" type="number" min="1" max="25" value="8"></div>
<div class="row"><label for="price" id="lbPrice"></label><input id="price" type="number" min="10" max="10000" value="620"></div>
<div class="row"><label for="scene" id="lbScene"></label>
<select id="scene">
<option value="pv" id="opt1"></option>
<option value="agri" id="opt2"></option>
<option value="research" id="opt3"></option>
<option value="industry" id="opt4"></option>
</select></div>
<button class="btn" id="simulate"></button>
</div>
<aside class="result">
<div class="result-row"><div class="k" id="rk1"></div><div id="outBand"></div></div>
<div class="result-row"><div class="k" id="rk2"></div><div id="outTier"></div></div>
<div class="result-row"><div class="k" id="rk3"></div><div id="outQuote"></div></div>
<div class="result-row"><div class="k" id="rk4"></div><div id="outMatch"></div></div>
<div class="result-row"><div class="k" id="rk5"></div><div id="outPlan"></div></div>
<div class="result-row"><div class="k" id="rk6"></div><div id="outValue"></div></div>
</aside>
</div>
</article>
</div>

<div id="finance">
<article class="panel">
<div class="title" id="finTitle"></div>
<div class="fin-item"><b id="f1h"></b><p id="f1p"></p></div>
<div class="fin-item"><b id="f2h"></b><p id="f2p"></p></div>
<div class="fin-item"><b id="f3h"></b><p id="f3p"></p></div>
<div class="fin-item"><b id="f4h"></b><p id="f4p"></p></div>
<ul class="timeline">
<li><h4 id="t1h"></h4><p id="t1p"></p></li>
<li><h4 id="t2h"></h4><p id="t2p"></p></li>
<li><h4 id="t3h"></h4><p id="t3p"></p></li>
<li><h4 id="t4h"></h4><p id="t4p"></p></li>
</ul>
</article>
</div>
</section>

<section class="panel team" id="team">
<div class="team-head">
<h2 id="teamTitle"></h2>
<p id="teamSub"></p>
</div>
<div class="team-grid" id="teamGrid"></div>
</section>

<div class="note" id="note"></div>
</div>

<div class="modal" id="memberModal" aria-hidden="true">
<div class="modal-card">
<div class="modal-top">
<h3 id="modalName"></h3>
<button class="close" id="modalClose" aria-label="Close">&times;</button>
</div>
<div class="modal-main">
<img class="modal-photo" id="modalImage" src="" alt="member photo">
<div>
<p class="line"><span class="k" id="mk1"></span><span class="v" id="modalFieldName"></span></p>
<p class="bio" id="modalBio"></p>
</div>
</div>
</div>
</div>

<script src="assets/js/team-data.js"></script>
<script src="assets/js/business-plan.js"></script>
<script>
(function(){var n=document.getElementById("nav");if(!n)return;var a=n.querySelectorAll("a");for(var i=0;i<a.length;i++)a[i].addEventListener("click",function(){n.classList.remove("open")})})();
</script>
</body>
</html>
